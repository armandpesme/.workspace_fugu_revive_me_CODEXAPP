  { path = "../.agents/skills/forge-mixin-safety", enabled = true },
  { path = "../.agents/skills/forge-runtime-debug", enabled = true },
  { path = "../.agents/skills/minecraft-log-tools", enabled = true },
  { path = "../.agents/skills/explore-doc", enabled = true },
  { path = "../.agents/skills/mod-architecture", enabled = true },
  { path = "../.agents/skills/forge-build-check", enabled = true },
  { path = "../.agents/skills/forge-qa", enabled = true },
  { path = "../.agents/skills/forge-armor-variant-port", enabled = true },
  { path = "../.agents/skills/exee-plan", enabled = true },
  { path = "../.agents/skills/handoff", enabled = true },
  { path = "../.agents/skills/workspace-agent-skill-maintenance", enabled = true },
  { path = "../.agents/skills/retrospective-loop", enabled = true },
