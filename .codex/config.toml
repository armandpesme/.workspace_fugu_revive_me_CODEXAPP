# Codex local workspace configuration for Minecraft Forge 1.20.1.
# Priority: human instruction > this file > AGENTS.md > global user config.



approval_policy = "on-request"
sandbox_mode = "workspace-write"
project_root_markers = ["AGENTS.md", "project-gradle", ".git"]
project_doc_max_bytes = 24000
web_search = "cached"

[sandbox_workspace_write]
network_access = true

[shell_environment_policy]
inherit = "core"
ignore_default_excludes = false

[mcp_servers.gitnexus]
command = "gitnexus"
args = ["mcp"]
startup_timeout_sec = 30.0
tool_timeout_sec = 120.0
required = false

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
startup_timeout_sec = 60.0
tool_timeout_sec = 120.0
required = false

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
startup_timeout_sec = 60.0
tool_timeout_sec = 120.0
required = false
env_vars = ["CONTEXT7_API_KEY"]

[mcp_servers.blockbench]
url = "http://localhost:3000/bb-mcp"
required = false

[skills]
config = [
  { path = "../.agents/skills/braintime", enabled = true },
  { path = "../.agents/skills/context7-mcp", enabled = true },
  { path = "../.agents/skills/blockbench-modeling", enabled = true },
  { path = "../.agents/skills/forge-workspace-onboarding", enabled = true },
  { path = "../.agents/skills/forge-edit-scope", enabled = true },
